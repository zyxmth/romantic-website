<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confession Letter</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="falling-hearts" id="heartContainer"></div>
    <div class="random-popups" id="randomPopupContainer"></div>
    
    <div class="container">
        <div class="content" id="mainContent">
            <p class="message">It's over, zuki. :)</p>
            
            <button class="main-btn" onclick="navigateTo('message1')".</button>
            
            <div class="button-group">
                <button class="secondary-btn" onclick="navigateTo('message3')">.</button>
                <button class="secondary-btn" onclick="navigateTo('message2')">.</button>
            </div>
        </div>

        <div class="content hidden" id="message1Content">
            <div class="message-box">
                <img src="assets/images/confession.jpg" alt="My Confession" class="message-image" onerror="handleImageError(this)">
                <h2 class="message-title">.
                </p>
                <button class="back-btn" onclick="goBack()">← Back</button>
            </div>
        </div>

        <div class="content hidden" id="message3Content">
            <div class="message-box">
                <img src="assets/images/clues.jpg" alt="Clues" class="message-image" onerror="handleImageError(this)">
                <h2 class="message-title">.</h2>
                <p class="message-text">
                    .
                </p>
                <button class="back-btn" onclick="goBack()">← Back</button>
            </div>
        </div>

        <div class="content hidden" id="message2Content">
            <div class="message-box">
                <img src="assets/images/about.jpg" alt="About me" class="message-image" onerror="handleImageError(this)">
                <h2 class="message-title">.</h2>
                <p class="message-text">
                    .
                </p>
                <button class="back-btn" onclick="goBack()">← Back</button>
            </div>
        </div>
    </div>

    <script src="js/hearts.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
